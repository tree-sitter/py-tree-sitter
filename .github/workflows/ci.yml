name: CI

on:
  push:
    branches: [master, conan-py-build]
    paths:
      - tree_sitter/**
      - tests/**
      - CMakeLists.txt
      - conanfile.py
      - .github/workflows/ci.yml
  pull_request:
    paths:
      - tree_sitter/**
      - tests/**
      - CMakeLists.txt
      - conanfile.py
      - .github/workflows/ci.yml
  workflow_dispatch:

concurrency:
  group: ${{github.workflow}}-${{github.ref}}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        python: ["3.10", "3.11", "3.12", "3.13", "3.14"]
        os:
          - ubuntu-24.04
          - ubuntu-24.04-arm
          - macos-15
          - macos-15-intel
          - windows-2025
          - windows-11-arm
        exclude:
          - os: windows-11-arm
            python: "3.10"
    runs-on: ${{matrix.os}}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Set up Python ${{matrix.python}}
        uses: actions/setup-python@v6
        with:
          python-version: ${{matrix.python}}
      - name: Lint
        continue-on-error: true
        run: pipx run ruff check . --output-format=github
      - name: Build
        run: pip install -v --config-settings host-profile=./run-tests.profile .[tests]
      - name: Test
        run: cd tests && python -munittest -v
        # FIXME: remove when the tests stop crashing
        continue-on-error: ${{runner.os == 'Windows'}}
